# Enable P6Spy modules
modulelist=com.p6spy.engine.logging.P6LogFactory,com.p6spy.engine.spy.P6SpyFactory

# Send logs directly to console
appender=com.p6spy.engine.spy.appender.StdoutLogger

# Use custom SQL log format
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat

# Format: time | type | execution time | SQL query
customLogMessageFormat=%(currentTime) | SQL | %(executionTime)ms | %(sql)

# Exclude unnecessary logs (commit/rollback/debug noise)
excludecategories=info,debug,result,resultset,commit,rollback

# Date format for timestamp
dateformat=yyyy-MM-dd HH:mm:ss